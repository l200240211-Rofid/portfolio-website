
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rofid | Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <button id="theme-toggle">☀️</button>
    <div class="logo">Rofid</div>

    <nav>
        <a href="index.html" class="active">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="hero">

    <div class="hero-text">

        <span class="small-text">Frontend Developer</span>

        <h1>
            Modern <br>
            Portfolio Website
        </h1>

        <p>
            Mahasiswa yang fokus membuat website modern,
            responsive, dan elegan menggunakan HTML & CSS.
        </p>

        <div class="buttons">
            <a href="portfolio.html" class="btn-primary">
                Explore Work
            </a>

            <a href="contact.html" class="btn-secondary">
                Contact Me
            </a>
        </div>

    </div>

    <div class="hero-image">

    <!-- TALI -->
    <div class="hanger"></div>

    <!-- CARD -->
    <div class="profile-card">

        <img src="images/profile.jpeg" alt="Profile">

        <!-- GLOW -->
        <div class="bottom-light"></div>

    </div>

</div>

</section>
<script>

const toggleBtn =
document.getElementById("theme-toggle");

toggleBtn.onclick = function(){

    document.body.classList.toggle("light-mode");

    if(document.body.classList.contains("light-mode")){
        toggleBtn.innerHTML = "🌙";
    } else{
        toggleBtn.innerHTML = "☀️";
    }

}

</script>
</body>
</html>
